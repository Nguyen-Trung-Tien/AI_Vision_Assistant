name: mobile_app
description: "A new Flutter project."
publish_to: "none"
version: 1.7.0+2

environment:
  sdk: ^3.4.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  socket_io_client: ^3.1.4
  vibration: ^3.1.7
  flutter_tts: ^4.2.5
  camera: ^0.11.4
  google_mlkit_text_recognition: ^0.15.1
  google_mlkit_barcode_scanning: ^0.14.2
  speech_to_text: ^7.3.0
  geolocator: ^14.0.2
  flutter_compass: ^0.8.1
  url_launcher: ^6.3.2
  shared_preferences: ^2.3.3
  path_provider: ^2.1.5
  tflite_flutter: ^0.11.0
  image: ^4.8.0
  flutter_contacts: ^1.1.9+2
  permission_handler: ^12.0.1
  http: ^1.6.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  file_picker: ^10.3.10
  syncfusion_flutter_pdf: ^33.1.45
  battery_plus: ^7.0.0
  archive: ^4.0.7
  flutter_soloud: ^4.0.0
  google_mlkit_face_detection: ^0.13.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.16
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/
    - assets/audio/
    - assets/image/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "android/app/src/main/res/ic_launcher.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#0a0a1a"
  image: "android/app/src/main/res/ic_launcher.png"
  android: true
  ios: true
  fullscreen: true
